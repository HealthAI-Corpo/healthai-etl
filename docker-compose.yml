services:
  # --- BASE DE DONNÉES RELATIONNELLE ---
  db:
    image: postgres:15
    container_name: healthai_db_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- BASE DE DONNÉES NOSQL ---
  mongodb:
    image: mongo:latest
    container_name: healthai_mongodb
    environment:
      # MongoDB utilise des variables spécifiques pour l'init
      MONGO_INITDB_ROOT_USERNAME: ${POSTGRES_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # --- MICRO-SERVICE ETL / ADMIN ---
  api:
    build: .
    container_name: healthai_api
    depends_on:
      - db
      - rabbitmq
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${DATA_DIR}:/app/data

  # --- MICRO-SERVICE IA ---
  ai_service:
    build: ./services/ai_service
    container_name: healthai_ai_service
    depends_on:
      - mongodb
      - rabbitmq
    env_file: .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB}
    ports:
      - "8001:8001"
    volumes:
      - ./services/ai_service:/app

  # --- MESSAGERIE ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: healthai_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
  mongo_data:
